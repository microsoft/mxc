trigger: none
name: $(SourceBranchName)_$(Date:yyyyMMdd)$(Rev:.r)

resources:
  repositories:
  - repository: 1ESPipelineTemplates
    type: git
    name: 1ESPipelineTemplates/1ESPipelineTemplates
    ref: refs/tags/release

# Parameters for ESRP signing info will be passed from the ADO UI.
parameters:
  - name: officialBuild
    displayName: Build Official or Unofficial
    type: string
    default: Official
    values:
      - Official
      - Unofficial

  - name: ESRPInfo
    type: object
    default:
      serviceName: ''
      tenantId: ''
      azureKeyVaultName: ''
      authCertName: ''
      signCertName: ''
      clientId: ''

variables:
  # Prevents failure when no Rust tests are found; pipeline runs will still fail if present
  # tests do not pass.
  NEXTEST_NO_TESTS: pass

extends:
  template: v1/1ES.${{parameters.officialBuild}}.PipelineTemplate.yml@1ESPipelineTemplates
  parameters:
    pool:
      name: Azure-Pipelines-1ESPT-ExDShared
      image: windows-2022
      os: windows

    customBuildTags:
    - ES365AIMigrationTooling

    stages:
    - stage: Build_Binaries
      displayName: 'Build Executables'
      jobs:

        # Build Binaries for all targets in parallel
        - template: .azure-pipelines/templates/Rust.Build.Job.yml@self
          parameters:
            isOfficialBuild: ${{ eq(parameters.officialBuild, 'Official') }}
            matrix:
              - name: windows_x64
                os: windows
                arch: x64
                component: WXC
              - name: windows_arm64
                os: windows
                arch: arm64
                component: WXC
              - name: linux_x64
                os: linux
                arch: x64
                component: LXC
              - name: linux_arm64
                os: linux
                arch: arm64
                component: LXC

            ESRPInfo: ${{ parameters.ESRPInfo }}

    - stage: Package_MXC_NPM_SDK
      displayName: 'Package Npm Sdk'
      dependsOn: Build_Binaries
      jobs:
      - template: .azure-pipelines/templates/Package.NpmSdk.Job.yml@self
        parameters:
          targets:
            - artifact: wxc-binaries-x86_64-pc-windows-msvc
              sdkArch: x64
            - artifact: wxc-binaries-aarch64-pc-windows-msvc
              sdkArch: arm64
            - artifact: lxc-binaries-x86_64-unknown-linux-gnu
              sdkArch: x64
            - artifact: lxc-binaries-aarch64-unknown-linux-gnu
              sdkArch: arm64

          ESRPInfo: ${{ parameters.ESRPInfo }}

    - stage: SDK_Unit_Tests
      displayName: 'SDK Unit Tests'
      dependsOn: Build_Binaries
      jobs:
      - job: sdk_unit_tests_windows
        displayName: SDK Unit Tests (Windows)
        pool:
          name: Azure-Pipelines-1ESPT-ExDShared
          image: windows-2022
          os: windows
        steps:
          - checkout: self
          - script: npm ci
            workingDirectory: $(Build.SourcesDirectory)/sdk
            displayName: npm ci
          - script: npm run build
            workingDirectory: $(Build.SourcesDirectory)/sdk
            displayName: npm run build
          - script: npm test
            workingDirectory: $(Build.SourcesDirectory)/sdk
            displayName: npm test

    - stage: SDK_Integration_Tests
      displayName: 'SDK Integration Tests'
      dependsOn: Package_MXC_NPM_SDK
      jobs:
      - template: .azure-pipelines/templates/SDK.Integration.Test.Job.yml@self