#
# One-click crate release: publishes the `mxc-sdk` crate and its first-party
# dependency closure to crates.io.
#
#   Run pipeline -> (always) DryRun stage previews every crate
#                -> (only when dryRun = false) Publish stage waits for manual
#                   approval on the MXC-CratesIo-Production environment, then
#                   publishes leaf-first to crates.io.
#
# The `dryRun` parameter defaults to true, so an accidental run never publishes.
#
# Secrets stay OUT of this public repository:
#   * CARGO_REGISTRY_TOKEN comes from the ADO variable group
#     `MXC-CratesIo-Publish` and is mapped to the environment only in the
#     Publish stage. It is never written here.
#
# One-time ADO setup required before the first real publish (cannot live in the
# repo) -- see the checklist at the bottom of this file.
#
# Unlike the build/lint jobs, the publish job deliberately does NOT run
# Cargo.Setup.Public/Private.yml: those redirect crates.io to the internal
# Azure Artifacts mirror. Publishing must talk to the real crates.io, so the
# only cargo config in effect is the repo-root .cargo/config.toml (Windows
# rustflags only -- no source replacement, and inert on Linux).

trigger: none
name: $(SourceBranchName)_$(Date:yyyyMMdd)$(Rev:.r)

parameters:
  - name: dryRun
    displayName: "Dry run (preview only -- do NOT publish to crates.io)"
    type: boolean
    default: true

resources:
  repositories:
    - repository: 1ESPipelineTemplates
      type: git
      name: 1ESPipelineTemplates/1ESPipelineTemplates
      ref: refs/tags/release

variables:
  - name: rustTargetTriple
    value: x86_64-unknown-linux-gnu

extends:
  template: v1/1ES.Official.PipelineTemplate.yml@1ESPipelineTemplates
  parameters:
    pool:
      name: Azure-Pipelines-1ESPT-ExDShared
      image: ubuntu-latest
      os: linux

    customBuildTags:
      - ES365AIMigrationTooling

    sdl:
      sourceAnalysisPool:
        name: Azure-Pipelines-1ESPT-ExDShared
        image: windows-latest
        os: windows

    stages:
      # ----------------------------------------------------------------------
      # Preview: always runs, publishes nothing. Gives the operator the full
      # `cargo publish --dry-run` + packaged-file list for every crate before
      # anything reaches crates.io.
      # ----------------------------------------------------------------------
      - stage: DryRun
        displayName: "Preview crate publish (dry run)"
        jobs:
          - job: DryRunJob
            displayName: "cargo publish --dry-run"
            steps:
              - checkout: self

              - template: templates/Rust.Toolchain.Public.yml@self
                parameters:
                  targetTriple: $(rustTargetTriple)

              - script: python3 .azure-pipelines/scripts/publish_crates_to_cratesio.py --dry-run
                displayName: "Dry-run publish mxc-sdk closure"
                workingDirectory: $(Build.SourcesDirectory)

      # ----------------------------------------------------------------------
      # Publish: compiled into the pipeline only when dryRun = false. The
      # deployment job binds to the MXC-CratesIo-Production environment, whose
      # manual-approval check is the interactive gate before crates.io upload.
      # ----------------------------------------------------------------------
      - ${{ if not(parameters.dryRun) }}:
          - stage: Publish
            displayName: "Publish crates to crates.io"
            dependsOn: DryRun
            variables:
              - group: MXC-CratesIo-Publish
            jobs:
              - deployment: PublishCrates
                displayName: "cargo publish -> crates.io"
                environment: MXC-CratesIo-Production
                strategy:
                  runOnce:
                    deploy:
                      steps:
                        - checkout: self

                        - template: templates/Rust.Toolchain.Public.yml@self
                          parameters:
                            targetTriple: $(rustTargetTriple)

                        - script: python3 .azure-pipelines/scripts/publish_crates_to_cratesio.py
                          displayName: "Publish mxc-sdk closure to crates.io"
                          workingDirectory: $(Build.SourcesDirectory)
                          env:
                            CARGO_REGISTRY_TOKEN: $(CARGO_REGISTRY_TOKEN)

# ----------------------------------------------------------------------------
# ONE-TIME ADO / crates.io SETUP (out of band -- not codeable in this repo)
# ----------------------------------------------------------------------------
# 1. OSPO / release sign-off to publish MXC to crates.io.
# 2. Reserve (or first-publish) the 9 crate names on crates.io using an account
#    that owns them: mxc_telemetry, mxc_pty, sandbox_spec, wxc_common,
#    lxc_common, seatbelt_common, appcontainer_common, bwrap_common, mxc-sdk.
#    (All 9 were unregistered at authoring time.)
# 3. Create a crates.io API token scoped to publish-new + publish-update for
#    those crates.
# 4. ADO > Pipelines > Library: create variable group `MXC-CratesIo-Publish`
#    with secret variable `CARGO_REGISTRY_TOKEN` = that token. Authorize this
#    pipeline to use it.
# 5. ADO > Pipelines > Environments: create `MXC-CratesIo-Production` and add an
#    "Approvals and checks" > manual Approval with the release approvers.
# 6. Allowlist crates.io on the 1ES pool egress (network isolation blocks it by
#    default): api.crates.io, index.crates.io, static.crates.io. Required for
#    BOTH stages (dry run resolves dependencies against the index too).
# 7. Register this YAML as a new 1ES Official pipeline and run it (dryRun stays
#    checked for the first run).
