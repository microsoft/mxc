trigger: none
name: $(SourceBranchName)_$(Date:yyyyMMdd)$(Rev:.r)
resources:
  repositories:
  - repository: 1ESPipelineTemplates
    type: git
    name: 1ESPipelineTemplates/1ESPipelineTemplates
    ref: refs/tags/release

parameters:
  - name: ESRPInfo
    type: object
    default:
      serviceName: ''
      tenantId: ''
      azureKeyVaultName: ''
      signCertName: ''
      clientId: ''
      ApproversEmail: ''
      OwnersEmail: ''

extends:
  template: v1/1ES.Official.PipelineTemplate.yml@1ESPipelineTemplates
  parameters:
    pool:
      name: Azure-Pipelines-1ESPT-ExDShared
      image: windows-2022
      os: windows
    customBuildTags:
    - ES365AIMigrationTooling

    sdl:
      sourceAnalysisPool:
        name: Azure-Pipelines-1ESPT-ExDShared
        image: windows-latest
        os: windows

    stages:
    - stage: Publish_to_NPM
      displayName: 'Publish NPM Package'
      variables:
      - name: release_environment
        value: Production
      jobs:
      - job: ReleaseJob
        templateContext:
          type: releaseJob
          isProduction: true
          inputs:
          - input: pipelineArtifact
            targetPath: '$(Pipeline.Workspace)/packages'
            artifactName: mxc-sdk-package

        displayName: Publish to NPM
        pool:
          type: release
        steps:
        - task: EsrpRelease@10
          displayName: 'Publish to NPM'
          inputs:
            connectedservicename: ${{ parameters.ESRPInfo.serviceName }} # name of the ARM service connection 
            usemanagedidentity: true 
            keyvaultname: ${{ parameters.ESRPInfo.azureKeyVaultName }} # Key vault that stores the signing certificate 
            signcertname: ${{ parameters.ESRPInfo.signCertName }} # Name of the sign certificate in above key vault
            clientid: ${{ parameters.ESRPInfo.clientId }} # ESPR Client Id. Old App Registration Id which you mapped your Managed Identity Id.
            contenttype: npm
            folderlocation: '$(Pipeline.Workspace)/packages'
            owners: ${{ parameters.ESRPInfo.OwnersEmail }} # comma separated email list of pipeline owners
            approvers: ${{ parameters.ESRPInfo.ApproversEmail }} # comma separated email list of approvers
            mainpublisher: ESRPRELPACMAN
            domaintenantid: ${{ parameters.ESRPInfo.tenantId }} 

  