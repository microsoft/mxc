# Shared build stages used by `1ES.Build.yml` (PR/CI) and
# `1ES.Build.Official.yml` (signed). `isOfficialBuild` gates signing steps;
# `ESRPInfo` is populated by the official pipeline from the
# MXC-ESRP-Signing variable group and left empty otherwise.

parameters:
  - name: isOfficialBuild
    type: boolean

  - name: debug
    type: boolean
    default: false

  - name: ESRPInfo
    type: object
    default:
      serviceName: ''
      tenantId: ''
      azureKeyVaultName: ''
      authCertName: ''
      signCertName: ''
      clientId: ''

variables:
  - name: NEXTEST_NO_TESTS
    value: pass

stages:
- stage: Build_Binaries
  displayName: 'Build Executables'
  jobs:

    - template: Rust.Build.Job.yml
      parameters:
        isOfficialBuild: ${{ parameters.isOfficialBuild }}
        matrix:
          - name: windows_x64
            os: windows
            arch: x64
            component: WXC
          - name: windows_arm64
            os: windows
            arch: arm64
            component: WXC
          - name: linux_x64
            os: linux
            arch: x64
            component: LXC
          - name: linux_arm64
            os: linux
            arch: arm64
            component: LXC

        ESRPInfo: ${{ parameters.ESRPInfo }}

    # macOS uses a separate template because it runs on a different
    # pool (Microsoft-hosted). The produced artifact name follows the same
    # scheme (mxc-binaries-<triplet>) so Package_MXC_NPM_SDK can consume it.
    - template: Mac.Build.Job.yml
      parameters:
        isOfficialBuild: ${{ parameters.isOfficialBuild }}
        ESRPInfo: ${{ parameters.ESRPInfo }}

- stage: Package_MXC
  displayName: 'Package MXC'
  dependsOn: Build_Binaries
  jobs:
  - template: Package.NpmSdk.Job.yml
    parameters:
      targets:
        - artifact: wxc-binaries-x86_64-pc-windows-msvc
          sdkArch: x64
        - artifact: wxc-binaries-aarch64-pc-windows-msvc
          sdkArch: arm64
        - artifact: lxc-binaries-x86_64-unknown-linux-gnu
          sdkArch: x64
        - artifact: lxc-binaries-aarch64-unknown-linux-gnu
          sdkArch: arm64
        - artifact: mxc-binaries-aarch64-apple-darwin
          sdkArch: arm64

      ESRPInfo: ${{ parameters.ESRPInfo }}

  - template: Mxc.Binary.Packaging.Job.yml

- stage: Lint
  displayName: 'Lint'
  dependsOn: []
  jobs:
  - template: Lint.Job.yml

- stage: SDK_Unit_Tests
  displayName: 'SDK Unit Tests'
  dependsOn: []
  jobs:
  - template: SDK.Unit.Test.Job.yml
    parameters:
      debug: ${{ parameters.debug }}

- stage: SDK_Integration_Tests
  displayName: 'SDK Integration Tests'
  dependsOn: Package_MXC
  jobs:
  - template: SDK.Integration.Test.Job.yml
    parameters:
      debug: ${{ parameters.debug }}
