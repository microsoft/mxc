parameters:
- name: Targets
  type: object
  default: []   # list of { artifact, path, sdkArch }
- name: ESRPInfo
  type: object
  default: {}

jobs:
- job: package_mxc_npm_sdk
  displayName: Package Mxc Npm Sdk
  pool:
    name: Azure-Pipelines-1ESPT-ExDShared
    image: ubuntu-latest
    os: linux
  variables:
    outputDirectory: $(Build.SourcesDirectory)/out
    sdkDirectory: $(Build.SourcesDirectory)/sdk
    artifactBaseName: mxc-npm-sdk-package

  steps:
    - checkout: self

    - task: UseNode@1
      displayName: Use Node.js 20
      inputs:
        version: '20.x'

    # Download all artifacts dynamically
    - ${{ each target in parameters.targets }}:
      - task: DownloadPipelineArtifact@2
        displayName: Download ${{ target.artifact }}
        inputs:
          artifact: ${{ target.artifact }}
          path: $(sdkDirectory)/bin/${{ target.sdkArch }}

    # Pipeline artifact downloads strip Unix execute permissions.
    # Restore +x on Linux binaries so the tarball preserves them.
    - script: chmod +x $(sdkDirectory)/bin/*/lxc-exec
      displayName: Restore execute permission on lxc-exec

    # Archive sdk/bin (x64/ + arm64/, executables + pdbs) for upload to the
    # GitHub Release page, until we publish to a symbol server.
    - task: ArchiveFiles@2
      displayName: Archive mxc-release-binaries.zip
      inputs:
        rootFolderOrFile: '$(sdkDirectory)/bin'
        includeRootFolder: false
        archiveType: zip
        archiveFile: '$(outputDirectory)/release-binaries/mxc-release-binaries.zip'
        replaceExistingArchive: true

    - task: 1ES.PublishPipelineArtifact@1
      displayName: Publish mxc-release-binaries artifact
      inputs:
        path: '$(outputDirectory)/release-binaries'
        artifactName: mxc-release-binaries

    # Strip pdbs before npm pack — symbols ship via mxc-release-binaries.zip.
    - script: rm -f $(sdkDirectory)/bin/*/*.pdb
      displayName: Strip pdbs from npm package

    # Copy .npmrc to the SDK directory so Azure artifacts feed is used for npm install.
    - task: CopyFiles@2
      displayName: Copy .npmrc to SDK
      inputs:
        SourceFolder: '$(Build.SourcesDirectory)/.azure-pipelines/.npm'
        Contents: '.npmrc'
        TargetFolder: '$(sdkDirectory)'

    - task: NpmAuthenticate@0
      displayName: NPM Authenticate
      inputs:
        workingFile: '$(sdkDirectory)/.npmrc'

    - script: npm ci
      workingDirectory: $(sdkDirectory)
      displayName: npm ci

    - script: npm run build
      workingDirectory: $(sdkDirectory)
      displayName: npm run build

    - script: npm pack
      workingDirectory: $(sdkDirectory)
      displayName: npm pack

    - task: CopyFiles@2
      displayName: Copy npm package
      inputs:
        sourceFolder: $(sdkDirectory)
        contents: |
          *.tgz
        targetFolder: '$(outputDirectory)/packages'

    - task: 1ES.PublishPipelineArtifact@1
      displayName: Upload SDK as pipeline artifact
      inputs:
        path: '$(outputDirectory)/packages'
        artifactName: $(artifactBaseName)