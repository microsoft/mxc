#
# Unofficial / fork-PR Rust toolchain + cargo build/test. Public crates.io,
# no auth tasks. (Fork PRs against a public upstream lose System.AccessToken,
# so any task that defaults its authenticationToken to $(System.AccessToken)
# fails at prep time — that rules out 1ES.Build.Rust.* and CargoAuthenticate.)

parameters:
- name: targetTriple
  type: string
- name: workingDirectory
  type: string
- name: cargoArgs
  type: string
  default: ''
- name: enableTest
  type: string
  default: 'true'
- name: rustVersion
  type: string
  # Public rustup channel matching the `1.93` pin in src/rust-toolchain.toml.
  # (Official builds use the internal 'ms-prod-1.93' from Mxc-Azure-Feed.)
  default: '1.93'

steps:
  - template: Rust.Toolchain.Public.yml@self
    parameters:
      targetTriple: ${{ parameters.targetTriple }}
      rustVersion: ${{ parameters.rustVersion }}

  # Redirect crates.io to the public MxcDependencies feed (1ES network isolation
  # blocks crates.io).
  - template: Cargo.Setup.Public.yml@self

  # Force cargo to use system `git` for git-source fetches instead of libgit2.
  # libgit2 fast-fails (~16s) on the picolibc-bsd shallow submodule fetch from
  # the 1ES pool; system git (same one the checkout step uses) succeeds.
  # Pre-fetch all crate + git deps in one explicit step (with system git for
  # libgit2-flaky git fetches). Build/test then run --offline against the local
  # cache, so transient pool network blips can't poison the actual build.
  - script: cargo fetch --locked --target ${{ parameters.targetTriple }}
    displayName: Fetch dependencies
    workingDirectory: ${{ parameters.workingDirectory }}
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: 'true'

  - script: cargo build --locked --offline --release --target ${{ parameters.targetTriple }} ${{ parameters.cargoArgs }}
    displayName: Build
    workingDirectory: ${{ parameters.workingDirectory }}

  - script: cargo test --locked --offline --release --target ${{ parameters.targetTriple }} ${{ parameters.cargoArgs }}
    displayName: Test
    workingDirectory: ${{ parameters.workingDirectory }}
    condition: eq('${{ parameters.enableTest }}', 'true')
