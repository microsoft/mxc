parameters:
- name: debug
  type: boolean
  default: false
- name: targets
  type: object
  default:
    - name: windows
      os: windows
    - name: linux
      os: linux

jobs:
- ${{ each target in parameters.targets }}:
  - job: 'sdk_unit_tests_${{ target.name }}'
    displayName: 'SDK Unit Tests (${{ target.name }})'

    pool:
      name: Azure-Pipelines-1ESPT-ExDShared
      ${{ if eq(target.os, 'windows') }}:
        image: windows-2022
        os: windows
      ${{ if eq(target.os, 'linux') }}:
        image: ubuntu-latest
        os: linux

    variables:
      sdkDirectory: $(Build.SourcesDirectory)/sdk
      # Cache npm package downloads across runs (see Package.NpmSdk.Job.yml).
      npm_config_cache: $(Pipeline.Workspace)/.npm

    steps:
      - checkout: self

      - task: UseNode@1
        displayName: Use Node.js 20
        inputs:
          version: '20.x'

      - task: Cache@2
        displayName: Cache npm
        inputs:
          key: 'npm | "$(Agent.OS)" | sdk/package-lock.json'
          restoreKeys: |
            npm | "$(Agent.OS)"
          path: $(npm_config_cache)

      - task: CopyFiles@2
        displayName: Copy .npmrc to SDK
        inputs:
          SourceFolder: '$(Build.SourcesDirectory)/.azure-pipelines/.npm'
          Contents: '.npmrc'
          TargetFolder: '$(sdkDirectory)'

      - task: NpmAuthenticate@0
        displayName: NPM Authenticate
        inputs:
          workingFile: '$(sdkDirectory)/.npmrc'

      - script: npm ci
        workingDirectory: $(sdkDirectory)
        displayName: npm ci

      - script: npm run build
        workingDirectory: $(sdkDirectory)
        displayName: npm run build

      - script: npm test
        workingDirectory: $(sdkDirectory)
        displayName: npm test
        env:
          MXC_DEBUG: ${{ parameters.debug }}
