name: '📋 Task'
description: A task that needs to be completed.
type: Task
labels:
- Issue-Task
- Needs-Triage
body:
  - type: textarea
    attributes:
      label: Description of the task
      placeholder: |
        A clear and concise description of the task and the expected outcome.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Additional context
      placeholder: Any additional context, links, or references related to this task.
    validations:
      required: false
