name: macOS Build

on:
  workflow_call:

jobs:
  build:
    name: ${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            # macos-14 / macos-latest are Apple Silicon (arm64).
            runner: macos-14
            target: aarch64-apple-darwin
          - arch: x64
            # macos-13 is the Intel (x86_64) image — builds AND runs the x64
            # slice natively so the Seatbelt characterization tests exercise it.
            runner: macos-13
            target: x86_64-apple-darwin
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        working-directory: src
    steps:
      - uses: actions/checkout@v4

      # actions-rust-lang/setup-rust-toolchain auto-reads rust-toolchain.toml
      # from the repo root only. Surface src/rust-toolchain.toml there so the
      # 1.93 pin is honored without duplicating the version in this workflow.
      - name: Surface toolchain file at repo root
        shell: bash
        working-directory: ${{ github.workspace }}
        run: cp src/rust-toolchain.toml rust-toolchain.toml

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}
          components: rustfmt, clippy
          override: false
          rustflags: ''

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src -> target
          key: ${{ matrix.target }}-v2
          cache-on-failure: false

      # Mac uses package selection rather than feature selection — the
      # workspace has Windows-only crates that won't compile here.
      - name: Build
        run: cargo build --locked --release --target ${{ matrix.target }}
             -p mxc_darwin -p seatbelt_common -p wxc_common -p wxc_e2e_tests

      # wxc_e2e_tests includes the Seatbelt executor characterization tests.
      # mxc-exec-mac (built above via -p mxc_darwin) is what they drive; the
      # tests skip via has_platform_exec() if it is missing. sandbox-exec needs
      # no elevation, so they run in this standard macOS job.
      - name: Test
        run: cargo test --locked --release --target ${{ matrix.target }}
             -p mxc_darwin -p seatbelt_common -p wxc_common -p wxc_e2e_tests

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: mxc-binaries-${{ matrix.target }}
          path: src/target/${{ matrix.target }}/release/mxc-exec-mac
          if-no-files-found: error
          retention-days: 1
