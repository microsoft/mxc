name: Windows Build

on:
  workflow_call:

jobs:
  build:
    name: ${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: windows-2025
            target: x86_64-pc-windows-msvc
            # tier2_bfs must NOT ship on Win 11 25H2 (bfscfg.exe hangs the host).
            features: hyperlight isolation_session microvm wslc
          - arch: arm64
            runner: windows-11-arm
            target: aarch64-pc-windows-msvc
            # nanvixd.exe is x64-only, so microvm tests can't run on arm64.
            features: hyperlight isolation_session wslc
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        working-directory: src
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          # Match src/rust-toolchain.toml — bump together.
          toolchain: '1.93'
          target: ${{ matrix.target }}
          components: rustfmt, clippy
          override: false
          rustflags: ''

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src -> target
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --locked --release --target ${{ matrix.target }}
             --no-default-features
             --features "${{ matrix.features }}"

      - name: Test
        run: cargo test --locked --release --target ${{ matrix.target }}
             --no-default-features
             --features "${{ matrix.features }}"

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: wxc-binaries-${{ matrix.target }}
          path: |
            src/target/${{ matrix.target }}/release/wxc-exec.exe
            src/target/${{ matrix.target }}/release/wxc-host-prep.exe
            src/target/${{ matrix.target }}/release/winhttp-proxy-shim.exe
            src/target/${{ matrix.target }}/release/wxc-windows-sandbox-daemon.exe
            src/target/${{ matrix.target }}/release/wxc-windows-sandbox-guest.exe
            src/target/${{ matrix.target }}/release/wxc-test-proxy.exe
            src/target/${{ matrix.target }}/release/mxc-diagnostic-console.exe
            src/target/${{ matrix.target }}/release/wslcsdk.dll
          if-no-files-found: warn
          retention-days: 1
