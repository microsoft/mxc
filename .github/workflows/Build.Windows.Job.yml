name: Windows Build

on:
  workflow_call:

jobs:
  build:
    name: ${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: windows-2025
            target: x86_64-pc-windows-msvc
            # tier2_bfs must NOT ship on Win 11 25H2 (bfscfg.exe hangs the host).
            features: hyperlight isolation_session microvm wslc
          - arch: arm64
            runner: windows-11-arm
            target: aarch64-pc-windows-msvc
            # nanvixd.exe is x64-only, so microvm tests can't run on arm64.
            features: hyperlight isolation_session wslc
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        working-directory: src
    steps:
      - uses: actions/checkout@v4

      # actions-rust-lang/setup-rust-toolchain auto-reads rust-toolchain.toml
      # from the repo root only. Surface src/rust-toolchain.toml there so the
      # 1.93 pin is honored without duplicating the version in this workflow.
      - name: Surface toolchain file at repo root
        shell: bash
        working-directory: ${{ github.workspace }}
        run: cp src/rust-toolchain.toml rust-toolchain.toml

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}
          components: rustfmt, clippy
          override: false
          rustflags: ''

      - name: Point cargo at the MxcDependencies feed
        uses: ./.github/actions/setup-cargo-feed

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src -> target
          key: ${{ matrix.target }}-v2
          cache-on-failure: false

      # hyperlight-host's build.rs writes hyperlight_surrogate.exe to a
      # non-standard target/.../build/hls/ path that rust-cache prunes on save.
      # On a cache hit, cargo thinks the build script is "fresh" and skips it,
      # but the RustEmbed proc-macro then can't find the missing folder. Force
      # the build script to re-run by clearing the crate's fingerprint.
      - name: Force hyperlight-host rebuild (cache workaround)
        if: matrix.target == 'x86_64-pc-windows-msvc'
        shell: pwsh
        run: cargo clean --release --target ${{ matrix.target }} -p hyperlight-host

      - name: Build
        run: cargo build --locked --release --target ${{ matrix.target }}
             --no-default-features
             --features "${{ matrix.features }}"

      - name: Test
        run: cargo test --locked --release --target ${{ matrix.target }}
             --no-default-features
             --features "${{ matrix.features }}"

      # Stage the shipped payload from the platform package's `files` allowlist
      # (single source of truth), preserving the bin/ + snapshots/ substructure,
      # and HARD-FAIL if any allowlisted build artifact is missing. Deriving the
      # list from the manifest (not a hardcoded list) means a new payload entry —
      # e.g. the micro-VM nanvixd.exe / kernel snapshots / wslcsdk.dll — can never
      # be silently dropped from the artifact again. The dev/test-only proxy is
      # staged separately (it is NOT shipped, but the integration job needs it).
      - name: Stage shipped payload (manifest-driven)
        shell: pwsh
        run: |
          $tuple = if ($env:TARGET -eq 'x86_64-pc-windows-msvc') { 'win32-x64' } else { 'win32-arm64' }
          $rel = "$env:GITHUB_WORKSPACE/src/target/${{ matrix.target }}/release"
          $manifest = "$env:GITHUB_WORKSPACE/sdk/node/platform-packages/$tuple/package.json"
          $stage = "$env:GITHUB_WORKSPACE/stage/${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          $files = & node "$env:GITHUB_WORKSPACE/scripts/platform-package-payload.js" $manifest
          if ($LASTEXITCODE -ne 0) { Write-Error "failed to read payload list from $manifest"; exit 1 }
          $missing = @()
          foreach ($f in $files) {
            $src = Join-Path $rel $f
            if (-not (Test-Path $src)) { $missing += $f; continue }
            $dest = Join-Path $stage $f
            New-Item -ItemType Directory -Force -Path (Split-Path $dest) | Out-Null
            Copy-Item $src $dest -Force
          }
          if ($missing.Count -gt 0) {
            Write-Error "Missing shipped payload file(s) for ${tuple}: $($missing -join ', ')"
            exit 1
          }
          # Test-only proxy (not part of the manifest / not shipped) for the
          # integration job; best-effort, not a failure if absent.
          $proxy = Join-Path $rel 'wxc-test-proxy.exe'
          if (Test-Path $proxy) { Copy-Item $proxy (Join-Path $stage 'wxc-test-proxy.exe') -Force }
          Write-Host "Staged $($files.Count) payload file(s) for $tuple."
          Get-ChildItem -Recurse $stage | Select-Object FullName
        env:
          TARGET: ${{ matrix.target }}

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: wxc-binaries-${{ matrix.target }}
          path: stage/${{ matrix.target }}/
          if-no-files-found: error
          retention-days: 1
