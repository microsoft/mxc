# Main GitHub Actions entry point for PR/CI builds and the upstream of
# `publish.yml`. Each stage lives in its own reusable workflow so this file
# stays a thin orchestrator (mirrors the 1ES `1ES.Build.yml` split).

name: Build

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'tests/examples/**'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - '.github/copilot-instructions.md'
      - '.github/instructions/**'
      - '**/*.md'
      - '.editorconfig'
  pull_request:
    branches: [main, 'feature/*', 'user/*']
    paths-ignore:
      - 'docs/**'
      - 'tests/examples/**'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - '.github/copilot-instructions.md'
      - '.github/instructions/**'
      - '**/*.md'
      - '.editorconfig'
  workflow_call:
  workflow_dispatch:

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  versioning-checks:
    uses: ./.github/workflows/Versioning.Checks.Job.yml

  lint:
    uses: ./.github/workflows/Lint.Job.yml

  windows-build:
    uses: ./.github/workflows/Build.Windows.Job.yml

  linux-build:
    uses: ./.github/workflows/Build.Linux.Job.yml

  macos-build:
    uses: ./.github/workflows/Build.MacOS.Job.yml

  sdk-unit-tests:
    uses: ./.github/workflows/SDK.Unit.Test.Job.yml

  package-npm-sdk:
    needs: [windows-build, linux-build, macos-build]
    uses: ./.github/workflows/Package.NpmSdk.Job.yml

  sdk-integration-tests:
    needs: package-npm-sdk
    uses: ./.github/workflows/SDK.Integration.Test.Job.yml
