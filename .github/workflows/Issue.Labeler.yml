name: "Issue Labeler"

# On new/edited/assigned issues this workflow:
#   1. Applies OS-*, Container-* and Area-* labels via github/issue-labeler
#      (regex config in .github/labeler.yml). It only ADDS labels
#      (sync-labels: 0), so human triage decisions are never overwritten.
#   2. Auto-assigns area owners based on title/body keyword matching, then
#      removes the Needs-Triage label once the issue has been auto-triaged
#      (an area label was applied or an owner is assigned).
#
# This workflow owns OS-*/Container-*/Area- labeling and Needs-Triage removal
# (previously the OS-* rules lived in .github/policies/labelManagement.issueOpened.yml
# and the Needs-Triage-on-assign rule in labelManagement.issueAssigned.yml; both were
# moved here). The `assigned` trigger preserves the old behavior of clearing
# Needs-Triage when a human manually assigns someone. The labeler never removes
# labels or existing assignees; the only label this workflow removes is
# Needs-Triage, and only after successful auto-triage.

on:
  issues:
    types: [opened, edited, assigned]

permissions:
  issues: write
  contents: read

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - name: Apply labels
        uses: github/issue-labeler@v3.4
        with:
          configuration-path: .github/labeler.yml
          enable-versioned-regex: 0
          include-title: 1
          include-body: 1
          sync-labels: 0
          repo-token: ${{ github.token }}

      - name: Assign owners and clear Needs-Triage
        uses: actions/github-script@v7
        with:
          script: |
            // Area owners, keyed by GitHub login. Each owner has a regex of
            // high-signal keywords matched (case-insensitive) against the
            // issue title + body. An issue can match several owners (e.g. a
            // "linux network firewall" issue -> Soham + Branden); all matching
            // owners are added. Existing assignees are preserved.
            const owners = [
              // Branden - networking / network policies
              { login: 'bbonaby',      regex: /\b(network|networking|firewall|iptables|proxy|dns|tcp\/?ip|\budp\b|\btcp\b|ipv[46]|network polic)/i },
              // Soham - Linux family backends
              { login: 'SohamDas2021', regex: /\b(linux|wslc|wsl2?|lxc|bubblewrap|bwrap)\b/i },
              // Jeff - AppContainer / BaseContainer / process isolation
              { login: 'jsidewhite',   regex: /\b(appcontainer|base ?container|process ?isolation|process ?container)\b/i },
              // Huzaifa - micro-VM backends + Windows Sandbox
              { login: 'huzaifa-d',    regex: /\b(micro-?vm|nanvix|hyperlight|windows ?sandbox)\b/i },
              // Adib - session isolation
              { login: 'adpa-ms',      regex: /\b(session ?isolation|isolation ?session|isosession)\b/i },
              // Richie - macOS
              { login: 'richiemsft',   regex: /\b(macos|mac ?os|darwin|seatbelt|xcode|mxc-exec-mac)\b/i },
            ];

            const { owner, repo } = context.repo;
            const issue = context.payload.issue;
            const issue_number = issue.number;
            const haystack = `${issue.title || ''}\n${issue.body || ''}`;

            // 1. Assign area owners (preserving any existing assignees).
            const existing = new Set((issue.assignees || []).map(a => a.login));
            const toAdd = owners
              .filter(o => o.regex.test(haystack))
              .map(o => o.login)
              .filter(login => !existing.has(login));

            if (toAdd.length > 0) {
              core.info(`Assigning: ${toAdd.join(', ')}`);
              await github.rest.issues.addAssignees({ owner, repo, issue_number, assignees: toAdd });
            } else {
              core.info('No new area owners matched; leaving assignees unchanged.');
            }

            // 2. Clear Needs-Triage if the issue has been auto-triaged, i.e. the
            //    labeler step applied an OS-*/Container-*/Area-* label, or the
            //    issue now has an owner assigned. Re-fetch labels so we observe
            //    what the preceding labeler step just added (the webhook payload
            //    is a stale snapshot from before this run).
            const current = await github.rest.issues.listLabelsOnIssue({ owner, repo, issue_number });
            const labelNames = current.data.map(l => l.name);
            const hasAreaLabel = labelNames.some(n => /^(OS-|Container-|Area-)/.test(n));
            const hasAssignee = toAdd.length > 0 || existing.size > 0;

            if (labelNames.includes('Needs-Triage') && (hasAreaLabel || hasAssignee)) {
              core.info('Auto-triaged; removing Needs-Triage.');
              try {
                await github.rest.issues.removeLabel({ owner, repo, issue_number, name: 'Needs-Triage' });
              } catch (e) {
                // 404 => label already removed (race with a concurrent run); ignore.
                if (e.status !== 404) throw e;
              }
            }
