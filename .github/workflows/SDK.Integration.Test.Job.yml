name: SDK Integration Tests

on:
  workflow_call:

jobs:
  sdk-integration-tests:
    name: SDK Integration Tests (${{ matrix.os_label }})
    strategy:
      fail-fast: false
      matrix:
        # NOTE (round-3 P1-6): win32-arm64 and linux-arm64 are built and packed
        # but not yet exercised end-to-end here. The arm64 sandbox paths
        # (AppContainer on win32-arm64, Bubblewrap on linux-arm64) are unverified
        # on the hosted arm64 runners (windows-11-arm / ubuntu-24.04-arm) and
        # enabling them needs runner-side validation we haven't done. This is a
        # conscious deferral, tracked separately — NOT an accidental gap.
        include:
          - os_label: windows
            runner: windows-latest
            platform_slug: win32-x64
          - os_label: linux
            runner: ubuntu-latest
            platform_slug: linux-x64
          - os_label: macos
            runner: macos-14
            platform_slug: darwin-arm64
          - os_label: macos-x64
            # macos-13 is the Intel (x86_64) image — exercises the darwin-x64
            # executor slice end-to-end on real Intel hardware.
            runner: macos-13
            platform_slug: darwin-x64
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        working-directory: sdk/tests/integration
    env:
      MXC_SKIP_OS_BUILD_DEPENDENT_TESTS: '1'
      # Proxy-E2E enforcement is default-ON for EVERY lane (round-3 P0-2): a lane
      # that actually runs the sandbox but forgets to wire up the test proxy will
      # hard-fail (evaluateProxyAvailability throws) instead of silently skipping
      # green. Lanes that legitimately cannot run the sandbox on a public runner
      # (Windows/macOS set MXC_SKIP_OS_BUILD_DEPENDENT_TESTS, so `sandboxSkipReason`
      # short-circuits the proxy describe BEFORE the availability check) skip
      # cleanly without tripping this. The Linux lane runs the unprivileged
      # Bubblewrap sandbox, so it MUST provide the proxy (see below).
      MXC_REQUIRE_PROXY_TESTS: '1'
      # Skip network-dependent LXC tests on GHA. Capability probe
      # 27576588204 confirmed lxc-net.service + lxcbr0 + dnsmasq come up
      # cleanly on every supported runner, but the alpine download
      # template's eth0 stays IPv4-less inside the test window (only an
      # IPv6 link-local address is configured), so DHCP-dependent DNS
      # lookups fail. The non-network LXC paths (create/start/attach/
      # mount/exit-code/multi-command) all pass and ship LXC backend
      # coverage on GHA. ADO sets the same env var in
      # `.azure-pipelines/templates/SDK.Integration.Test.Job.yml`.
      MXC_SKIP_LXC_NETWORK_TESTS: '1'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sdk/tests/integration/package-lock.json

      - name: Download meta SDK package
        uses: actions/download-artifact@v4
        with:
          name: npm-packages
          path: sdk-pkg

      - name: Download platform binary packages
        uses: actions/download-artifact@v4
        with:
          name: npm-platform-packages
          path: sdk-platform-pkg

      # Real consumer shape: install the meta package plus the host's matching
      # platform tarball (the meta's optionalDependencies point at the registry,
      # where these may not be published yet).
      - name: Install dependencies + SDK from artifacts
        shell: bash
        run: |
          set -euo pipefail
          npm ci
          META_TGZ=$(ls "$GITHUB_WORKSPACE"/sdk-pkg/*.tgz | head -n1)
          PLAT_TGZ=$(ls "$GITHUB_WORKSPACE"/sdk-platform-pkg/microsoft-mxc-sdk-${{ matrix.platform_slug }}-*.tgz | head -n1)
          if [ -z "$META_TGZ" ] || [ -z "$PLAT_TGZ" ]; then
            echo "Missing meta ($META_TGZ) or platform ($PLAT_TGZ) tarball" >&2
            exit 1
          fi
          echo "Meta:     $META_TGZ"
          echo "Platform: $PLAT_TGZ"
          npm install "$META_TGZ" "$PLAT_TGZ"

      - name: npm run build
        run: npm run build

      - name: Install bubblewrap + LXC stack (Linux only, cached)
        if: matrix.os_label == 'linux'
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: bubblewrap lxc lxc-utils dnsmasq-base iptables bridge-utils
          version: 1.3

      - name: Start LXC services (cache restore skips postinst hooks)
        if: matrix.os_label == 'linux'
        shell: bash
        run: |
          sudo apparmor_parser -rT /etc/apparmor.d/lxc* 2>/dev/null || true
          sudo systemctl start lxc-net 2>/dev/null || true

      # The platform package ships the executor but NOT the dev/test-only proxies
      # (#512). For the Linux proxy E2E tests, source linux-test-proxy from the
      # raw build artifact and REQUIRE the tests to run (no silent green-skip).
      - name: Provide linux-test-proxy (Linux only)
        if: matrix.os_label == 'linux'
        uses: actions/download-artifact@v4
        with:
          name: lxc-binaries-x86_64-unknown-linux-gnu
          path: test-proxy-bin

      - name: Restore execute permission on lxc-exec + linux-test-proxy (Linux)
        if: matrix.os_label == 'linux'
        shell: bash
        run: |
          set -euo pipefail
          BIN=$(find node_modules/@microsoft -name lxc-exec -print -quit)
          if [ -n "$BIN" ]; then chmod +x "$BIN"; else echo "lxc-exec not found" && exit 1; fi
          find "$GITHUB_WORKSPACE/test-proxy-bin" -name linux-test-proxy -exec chmod +x {} +

      - name: Restore execute permission on mxc-exec-mac (macOS)
        if: startsWith(matrix.os_label, 'macos')
        shell: bash
        run: |
          set -euo pipefail
          BIN=$(find node_modules/@microsoft -name mxc-exec-mac -print -quit)
          if [ -n "$BIN" ]; then chmod +x "$BIN"; else echo "mxc-exec-mac not found in installed packages" && exit 1; fi

      # Linux needs root for Bubblewrap unprivileged-userns paths; `sudo -E`
      # preserves the env vars above (including the job-wide MXC_REQUIRE_PROXY_TESTS).
      # The Linux lane runs the sandbox, so it provides the proxy via
      # MXC_TEST_PROXY_DIR; the enforcement is inherited from the job env so it
      # can't regress per-lane. Windows/macOS skip the proxy describe via
      # sandboxSkipReason (no runnable sandbox on a public runner) before the
      # availability check, so they need no proxy.
      - name: npm test
        shell: bash
        run: |
          if [ "${{ matrix.os_label }}" = "linux" ]; then
            sudo -E env \
              MXC_TEST_PROXY_DIR="$GITHUB_WORKSPACE/test-proxy-bin" \
              npm test
          else
            npm test
          fi
