name: SDK Unit Tests

on:
  workflow_call:

jobs:
  sdk-unit-tests:
    name: SDK Unit Tests (${{ matrix.os_label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os_label: windows
            runner: windows-latest
          - os_label: linux
            runner: ubuntu-latest
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        working-directory: sdk
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sdk/package-lock.json

      - run: npm ci
      - run: npm run build
      - run: npm test
