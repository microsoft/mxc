name: Versioning Checks

on:
  workflow_call:

jobs:
  versioning-checks:
    name: Versioning Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust toolchain
        run: rustup update stable

      - name: Check product version sync (Cargo == npm)
        run: node scripts/check-version-sync.js

      - name: Install tooling deps
        working-directory: scripts/versioning
        run: npm ci

      - name: Check schema version sync
        run: node scripts/versioning/check-schema-versions.js

      - name: Check Rust toolchain sync (rust-toolchain.toml == ADO template)
        run: node scripts/versioning/check-rust-toolchain-sync.js

      - name: Check codegen (dev schema + SDK wire types in sync with the Rust wire model)
        run: node scripts/versioning/check-codegen.js

      - name: Check schema conformance (corpus + SDK emission)
        run: node scripts/versioning/check-schema-conformance.js

      - name: Check config stability surface (promotion guard)
        run: node scripts/versioning/check-config-stability.js

      - name: Check the dev schema can be frozen to a valid stable schema
        run: node scripts/versioning/freeze-stable-schema.js --check
