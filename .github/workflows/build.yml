# Main GitHub Actions entry point for PR/CI builds and as the upstream of
# `publish.yml`. Each stage lives in its own reusable workflow so this file
# stays a thin orchestrator (mirrors the 1ES `1ES.Build.yml` split).

name: Build

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'tests/examples/**'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - '.github/copilot-instructions.md'
      - '.github/instructions/**'
      - '**/*.md'
      - '.editorconfig'
  pull_request:
    branches: [main, 'feature/*', 'user/*']
    paths-ignore:
      - 'docs/**'
      - 'tests/examples/**'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - '.github/copilot-instructions.md'
      - '.github/instructions/**'
      - '**/*.md'
      - '.editorconfig'
  workflow_call:
  workflow_dispatch:

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    uses: ./.github/workflows/_lint.yml

  rust-build:
    uses: ./.github/workflows/_rust-build.yml

  sdk-unit-tests:
    uses: ./.github/workflows/_sdk-unit-tests.yml

  package-npm-sdk:
    needs: rust-build
    uses: ./.github/workflows/_package-npm-sdk.yml

  sdk-integration-tests:
    needs: package-npm-sdk
    uses: ./.github/workflows/_sdk-integration-tests.yml
