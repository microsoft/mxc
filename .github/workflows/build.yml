name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_call:

jobs:

  # Validate versioning contracts: the product version (Cargo == npm) is in
  # sync; the schema-version constants are in sync across the Rust parser, SDK,
  # and schema filenames; and the example/test config corpus validates against
  # the dev JSON schema.
  versioning-checks:
    name: Versioning Checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check product version sync (Cargo == npm)
        run: node scripts/check-version-sync.js

      - name: Install tooling deps
        working-directory: scripts/versioning
        run: npm ci

      - name: Check schema version sync
        run: node scripts/versioning/check-schema-versions.js

      - name: Validate config corpus against dev schema
        run: node scripts/versioning/validate-configs.js


  # Check formatting and linting for the Rust code
  wxc-exec-lint:
    name: WXC Exec Lint
    runs-on: windows-latest

    defaults:
      run:
        working-directory: src

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust toolchain
        run: |
          rustup update stable
          rustup component add rustfmt clippy

      - name: Check formatting
        id: fmt
        continue-on-error: true
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Fail if formatting check failed
        if: steps.fmt.outcome == 'failure'
        run: exit 1


  # Build and test Rust on x64 and ARM64, upload binaries
  wxc-exec-build:
    name: WXC Exec Build (${{ matrix.target }})
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            runner: windows-2025
          - target: aarch64-pc-windows-msvc
            runner: windows-11-arm

    runs-on: ${{ matrix.runner }}

    defaults:
      run:
        working-directory: src

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust toolchain
        run: |
          rustup update stable
          rustup target add ${{ matrix.target }}

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Run tests
        run: cargo test --release --target ${{ matrix.target }} --workspace --exclude wxc_e2e_tests

      # Tier-2 (BFS) is off by default — production binaries on Win 11
      # 25H2 must NOT carry the `tier2_bfs` feature, since `bfscfg.exe`
      # hangs that host. The feature still has to compile and test
      # green so the dispatcher's T2 branch stays alive for hosts
      # where T2 is safe (post-25H2 or with the kernel hotfix). This
      # step adds the matrix entry the adversarial review flagged as
      # missing.
      - name: Run tier2_bfs feature tests (wxc_common)
        run: cargo test --release --target ${{ matrix.target }} -p wxc_common --features tier2_bfs

      - uses: actions/upload-artifact@v4
        with:
          name: wxc-exec-${{ matrix.target }}
          path: |
            src/target/${{ matrix.target }}/release/wxc-exec.exe
            src/target/${{ matrix.target }}/release/winhttp-proxy-shim.exe
            src/target/${{ matrix.target }}/release/wxc-test-proxy.exe
            src/target/${{ matrix.target }}/release/wxc-windows-sandbox-daemon.exe
            src/target/${{ matrix.target }}/release/wxc-windows-sandbox-guest.exe


  # Build and package the TypeScript SDK with bundled wxc-exec binaries
  mxc-typescript-sdk:
    name: MXC TypeScript SDK
    needs: wxc-exec-build
    runs-on: windows-latest

    defaults:
      run:
        working-directory: sdk

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download wxc-exec (x64)
        uses: actions/download-artifact@v4
        with:
          name: wxc-exec-x86_64-pc-windows-msvc
          path: sdk/bin/x64

      - name: Download wxc-exec (arm64)
        uses: actions/download-artifact@v4
        with:
          name: wxc-exec-aarch64-pc-windows-msvc
          path: sdk/bin/arm64

      - name: Set build version
        run: |
          $timestamp = Get-Date -Format "yyyyMMdd.HHmmss"
          npm version "$(node -p "require('./package.json').version")-build.$timestamp" --no-git-tag-version

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Pack npm package
        run: npm pack

      - uses: actions/upload-artifact@v4
        with:
          name: npm-packages
          path: sdk/*.tgz


  # Build and test the SDK integration tests against the packaged SDK
  mxc-sdk-integration-tests:
    name: MXC SDK Integration Tests
    needs: mxc-typescript-sdk
    runs-on: windows-latest

    defaults:
      run:
        working-directory: sdk/tests/integration

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download SDK package
        uses: actions/download-artifact@v4
        with:
          name: npm-packages
          path: sdk-pkg

      - name: Install dependencies and SDK from artifact
        run: |
          $sdkTgz = (Get-Item ..\..\..\sdk-pkg\*.tgz).FullName
          npm install $sdkTgz

      - name: Build tests
        run: npm run build

      - name: Run tests
        run: npm test
        env:
          MXC_SKIP_OS_BUILD_DEPENDENT_TESTS: '1'