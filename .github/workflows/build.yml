name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_call:

jobs:

  # Check formatting and linting for the WXC Rust code
  wxc-exec-lint:
    name: WXC Exec Lint
    runs-on: windows-latest

    defaults:
      run:
        working-directory: src

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust toolchain
        run: |
          rustup update stable
          rustup component add rustfmt clippy

      - name: Check formatting
        id: fmt
        continue-on-error: true
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Fail if formatting check failed
        if: steps.fmt.outcome == 'failure'
        run: exit 1


  # Build and run Rust tests on x64 and ARM64
  wxc-exec-test:
    name: WXC Exec Rust tests
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            runner: windows-2025
          - target: aarch64-pc-windows-msvc
            runner: windows-11-arm

    runs-on: ${{ matrix.runner }}

    defaults:
      run:
        working-directory: src

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust toolchain
        run: |
          rustup update stable
          rustup target add ${{ matrix.target }}

      - name: Run tests
        run: cargo test --workspace --target ${{ matrix.target }}


  # Build and package the TypeScript SDK
  wxc-typescript-sdk:
    name: WXC TypeScript SDK
    runs-on: windows-latest

    defaults:
      run:
        working-directory: sdk

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Pack npm package
        run: npm pack

      - uses: actions/upload-artifact@v4
        with:
          name: sdk-npm-package
          path: sdk/*.tgz


# Build and package the TypeScript CLI (needs SDK built first)
  wxc-typescript-cli:
    name: WXC TypeScript CLI
    needs: wxc-typescript-sdk
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download SDK package
        uses: actions/download-artifact@v4
        with:
          name: sdk-npm-package
          path: sdk-artifact

      - name: Build Rust workspace
        working-directory: src
        run: cargo build --release

      - name: Run Rust tests
        working-directory: src
        run: cargo test --release

      - name: Set SDK build version
        working-directory: sdk
        run: |
          $timestamp = Get-Date -Format "yyyyMMdd.HHmmss"
          npm version "$(node -p "require('./package.json').version")-build.$timestamp" --no-git-tag-version

      - name: Install and build SDK
        working-directory: sdk
        run: |
          npm ci
          npm run build

      - name: Install CLI dependencies
        working-directory: cli
        run: npm ci

      - name: Build CLI
        working-directory: cli
        run: npm run build

      - name: Pack npm package
        working-directory: cli
        run: npm pack

      - uses: actions/upload-artifact@v4
        with:
          name: cli-npm-package
          path: cli/*.tgz