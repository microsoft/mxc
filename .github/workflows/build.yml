name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_call:

jobs:

  # Check formatting and linting for the Rust code
  wxc-exec-lint:
    name: WXC Exec Lint
    runs-on: windows-latest

    defaults:
      run:
        working-directory: src

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust toolchain
        run: |
          rustup update stable
          rustup component add rustfmt clippy

      - name: Check formatting
        id: fmt
        continue-on-error: true
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Fail if formatting check failed
        if: steps.fmt.outcome == 'failure'
        run: exit 1


  # Build and test Rust on x64 and ARM64, upload binaries
  wxc-exec-build:
    name: WXC Exec Build (${{ matrix.target }})
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            runner: windows-2025
          - target: aarch64-pc-windows-msvc
            runner: windows-11-arm

    runs-on: ${{ matrix.runner }}

    defaults:
      run:
        working-directory: src

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust toolchain
        run: |
          rustup update stable
          rustup target add ${{ matrix.target }}

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Run tests
        run: cargo test --release --target ${{ matrix.target }} --workspace --exclude wxc_e2e_tests

      - uses: actions/upload-artifact@v4
        with:
          name: wxc-exec-${{ matrix.target }}
          path: |
            src/target/${{ matrix.target }}/release/wxc-exec.exe
            src/target/${{ matrix.target }}/release/winhttp-proxy-shim.exe
            src/target/${{ matrix.target }}/release/wxc-test-proxy.exe


  # Build and package the TypeScript SDK with bundled wxc-exec binaries
  mxc-typescript-sdk:
    name: MXC TypeScript SDK
    needs: wxc-exec-build
    runs-on: windows-latest

    defaults:
      run:
        working-directory: sdk

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download wxc-exec (x64)
        uses: actions/download-artifact@v4
        with:
          name: wxc-exec-x86_64-pc-windows-msvc
          path: sdk/bin/x64

      - name: Download wxc-exec (arm64)
        uses: actions/download-artifact@v4
        with:
          name: wxc-exec-aarch64-pc-windows-msvc
          path: sdk/bin/arm64

      - name: Set build version
        run: |
          $timestamp = Get-Date -Format "yyyyMMdd.HHmmss"
          npm version "$(node -p "require('./package.json').version")-build.$timestamp" --no-git-tag-version

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Pack npm package
        run: npm pack

      - uses: actions/upload-artifact@v4
        with:
          name: npm-packages
          path: sdk/*.tgz


  # Build and package the TypeScript Test CLI
  mxc-typescript-test-cli:
    name: MXC TypeScript Test CLI
    needs: mxc-typescript-sdk
    runs-on: windows-latest

    defaults:
      run:
        working-directory: cli

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download SDK package
        uses: actions/download-artifact@v4
        with:
          name: npm-packages
          path: sdk-pkg

      - name: Install CLI dependencies using SDK artifact
        run: |
          $sdkTgz = (Get-Item ..\sdk-pkg\*.tgz).FullName
          npm ci
          npm install $sdkTgz

      - name: Build CLI
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Pack npm package
        run: npm pack

      - uses: actions/upload-artifact@v4
        with:
          name: cli-npm-package
          path: cli/*.tgz