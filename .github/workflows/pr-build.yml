#
# GitHub-hosted PR build pipeline.
#
# Mirrors `.azure-pipelines/1ES.Build.yml` (the 1ES Rust build/release
# pipeline) so that PR validation runs on GitHub-hosted runners without
# depending on internal 1ES infrastructure.
#
# Why a separate pipeline (vs. reusing 1ES for PRs):
#   * Fork PRs in the public repo run with secrets stripped (ADO Fork PR
#     policy). The 1ES Rust tasks authenticate against the internal
#     Mxc-Azure-Feed via System.AccessToken, so they can't run on a fork
#     PR — the auth step fails before the build even starts.
#   * 1ES per-job startup overhead is significant; GitHub-hosted runners
#     have higher per-job throughput for PR-gate latency.
#   * Official / release builds keep running on 1ES (signing, SBOM,
#     governance). This file only covers PR validation.
#
# Drift risk: this pipeline and `.azure-pipelines/1ES.Build.yml` exercise
# the same source tree with the same cargo features, but the toolchain
# delivery is different (public rustup + crates.io here, ms-prod-1.93 +
# Mxc-Azure-Feed in 1ES). To catch drift early, 1ES still runs on every
# push to `main` (see the trigger in `1ES.Build.yml`). If you change one
# pipeline you almost always need to mirror the change in the other.

name: PR Build

on:
  pull_request:
    branches:
      - main
      - 'feature/*'
      - 'user/*'
    paths-ignore:
      # Keep this list in sync with the `paths: exclude:` blocks in
      # `.azure-pipelines/1ES.Build.yml` (trigger + pr). Only exclude
      # paths that cannot affect built artifacts or test behavior.
      - 'docs/**'
      - 'tests/examples/**'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - '.github/copilot-instructions.md'
      - '.github/instructions/**'
      - '**/*.md'
      - '.editorconfig'
  workflow_dispatch:

# Cancel in-flight runs when a PR receives a new push.
concurrency:
  group: pr-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:

  # ---------------------------------------------------------------------------
  # Stage: Lint  (mirrors `Lint.Job.yml` — runs in parallel with Build)
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (${{ matrix.component }} ${{ matrix.os_label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os_label: windows
            component: WXC
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            working-directory: src
            clippy-args: --locked --all-targets --all-features --release
          - os_label: linux
            component: LXC
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            # LXC build uses src/core/lxc as cwd; mirror it so the
            # cargo target-dir cache key is shared with the build job.
            working-directory: src/core/lxc
            clippy-args: --locked --all-targets --all-features --release
          - os_label: macos
            component: MAC
            runner: macos-14
            target: aarch64-apple-darwin
            working-directory: src
            # macOS-only crates — the workspace has Windows-only crates
            # that do not compile on macOS, so we can't use --all-features.
            clippy-args: --locked --release -p mxc_darwin -p seatbelt_common
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        working-directory: ${{ matrix.working-directory }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust toolchain
        # rust-toolchain.toml pins channel 1.93; rustup will install it
        # automatically on first cargo invocation. Force-install the
        # target now so cross-compile metadata is ready before build.
        # Runs from `src` so the toolchain pin is in scope.
        shell: bash
        working-directory: src
        run: |
          rustup show active-toolchain || rustup toolchain install
          rustup component add rustfmt clippy
          rustup target add ${{ matrix.target }}

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --target ${{ matrix.target }} ${{ matrix.clippy-args }} -- -D warnings

  # ---------------------------------------------------------------------------
  # Stage: Build_Binaries  (mirrors `Rust.Build.Job.yml` + `Mac.Build.Job.yml`)
  # ---------------------------------------------------------------------------
  build:
    name: Build (${{ matrix.arch }} ${{ matrix.component }})
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows x64 (WXC)
          - arch: x64
            component: WXC
            os_label: windows
            runner: windows-2025
            target: x86_64-pc-windows-msvc
            working-directory: src
            artifact-prefix: wxc-binaries
            # Explicit feature set (no --all-features): tier2_bfs must
            # NOT ship — see `Rust.Build.Job.yml` for the bfscfg.exe
            # rationale on Win 11 25H2.
            cargo-features: hyperlight isolation_session microvm wslc
            run-tests: 'true'
          # Windows ARM64 (WXC)
          - arch: arm64
            component: WXC
            os_label: windows
            runner: windows-11-arm
            target: aarch64-pc-windows-msvc
            working-directory: src
            artifact-prefix: wxc-binaries
            cargo-features: hyperlight isolation_session microvm wslc
            # arm64 binaries can't be exec-tested on x64 (and the arm
            # runner is slower); mirror the 1ES enableTest=false split.
            run-tests: 'false'
          # Linux x64 (LXC)
          - arch: x64
            component: LXC
            os_label: linux
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            working-directory: src/core/lxc
            artifact-prefix: lxc-binaries
            cargo-features: hyperlight
            run-tests: 'true'
          # Linux ARM64 (LXC) — native arm64 runner (no cross-compile,
          # unlike 1ES which cross-compiles from x64 via
          # gcc-aarch64-linux-gnu).
          - arch: arm64
            component: LXC
            os_label: linux
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            working-directory: src/core/lxc
            artifact-prefix: lxc-binaries
            cargo-features: hyperlight
            run-tests: 'true'
          # macOS ARM64 (MAC)
          # `macos-14` (and `macos-latest`) on GitHub-hosted runners
          # are Apple Silicon (arm64). Older labels like `macos-13`
          # are Intel — do not downgrade without also flipping the
          # target triple.
          - arch: arm64
            component: MAC
            os_label: macos
            runner: macos-14
            target: aarch64-apple-darwin
            working-directory: src
            artifact-prefix: mxc-binaries
            # Mac uses package selection rather than feature selection,
            # mirroring `Mac.Build.Job.yml`. Set features to empty and
            # carry the -p list in cargo-packages.
            cargo-features: ''
            cargo-packages: '-p mxc_darwin -p seatbelt_common -p wxc_common'
            run-tests: 'true'
    runs-on: ${{ matrix.runner }}
    env:
      # nextest isn't used here, but mirror the 1ES variable so tests
      # that opt into "no tests = pass" behave the same as on ADO.
      NEXTEST_NO_TESTS: pass
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust toolchain
        # rust-toolchain.toml pins channel 1.93; rustup will install it
        # automatically on first cargo invocation. We run from `src` so
        # the pin is in scope and `rustup target add` attaches the
        # target to the pinned channel rather than the default.
        shell: bash
        working-directory: src
        run: |
          rustup show active-toolchain || rustup toolchain install
          rustup target add ${{ matrix.target }}

      # Cargo target cache — mirrors the 1ES `Cache@2` key shape so
      # that this pipeline's cache layout stays parallel to ADO's.
      - name: Cache cargo target
        uses: actions/cache@v4
        with:
          path: |
            ${{ matrix.working-directory }}/target
            src/target
          key: cargo-target-${{ matrix.os_label }}-${{ matrix.target }}-${{ hashFiles('src/Cargo.lock') }}
          restore-keys: |
            cargo-target-${{ matrix.os_label }}-${{ matrix.target }}-

      - name: Build
        working-directory: ${{ matrix.working-directory }}
        shell: bash
        run: |
          set -euo pipefail
          ARGS="--locked --release --target ${{ matrix.target }}"
          if [ -n "${{ matrix.cargo-features }}" ]; then
            ARGS="$ARGS --no-default-features --features '${{ matrix.cargo-features }}'"
          fi
          if [ -n "${{ matrix.cargo-packages || '' }}" ]; then
            ARGS="$ARGS ${{ matrix.cargo-packages }}"
          fi
          eval cargo build $ARGS

      - name: Test
        if: matrix.run-tests == 'true'
        working-directory: ${{ matrix.working-directory }}
        shell: bash
        run: |
          set -euo pipefail
          ARGS="--locked --release --target ${{ matrix.target }}"
          if [ -n "${{ matrix.cargo-features }}" ]; then
            ARGS="$ARGS --no-default-features --features '${{ matrix.cargo-features }}'"
          fi
          if [ -n "${{ matrix.cargo-packages || '' }}" ]; then
            ARGS="$ARGS ${{ matrix.cargo-packages }}"
          fi
          eval cargo test $ARGS

      # linux_test_proxy is a separate workspace member (not a dep of
      # lxc), so the workspace-member-scoped build above doesn't pick
      # it up. Build it explicitly so it lands alongside lxc-exec and
      # gets copied into the artifact (mirrors the matching step in
      # `Rust.Build.Job.yml`).
      - name: Build linux-test-proxy
        if: matrix.os_label == 'linux'
        shell: bash
        run: |
          cargo build --locked --release --target ${{ matrix.target }} \
            -p linux_test_proxy \
            --manifest-path src/Cargo.toml

      # Stage the binaries the same way the 1ES `signPattern` does so
      # the artifact contents match what release / packaging expects.
      - name: Stage Windows binaries
        if: matrix.os_label == 'windows'
        shell: pwsh
        run: |
          $src = "src/target/${{ matrix.target }}/release"
          $dst = "out/${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path $dst | Out-Null
          $patterns = @(
            'wxc-exec.exe',
            'wxc-host-prep.exe',
            'winhttp-proxy-shim.exe',
            'wxc-windows-sandbox-daemon.exe',
            'wxc-windows-sandbox-guest.exe',
            'wxc-test-proxy.exe',
            'mxc-diagnostic-console.exe',
            'wslcsdk.dll'
          )
          foreach ($p in $patterns) {
            $f = Join-Path $src $p
            if (Test-Path $f) { Copy-Item $f $dst }
          }

      - name: Stage Linux binaries
        if: matrix.os_label == 'linux'
        shell: bash
        run: |
          set -euo pipefail
          src="src/target/${{ matrix.target }}/release"
          dst="out/${{ matrix.target }}"
          mkdir -p "$dst"
          for f in lxc-exec linux-test-proxy; do
            if [ -f "$src/$f" ]; then
              cp "$src/$f" "$dst/"
              chmod +x "$dst/$f"
            fi
          done

      - name: Stage macOS binaries
        if: matrix.os_label == 'macos'
        shell: bash
        run: |
          set -euo pipefail
          src="src/target/${{ matrix.target }}/release"
          dst="out/${{ matrix.target }}"
          mkdir -p "$dst"
          cp "$src/mxc-exec-mac" "$dst/"
          chmod +x "$dst/mxc-exec-mac"

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-prefix }}-${{ matrix.target }}
          path: out/${{ matrix.target }}
          if-no-files-found: error
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Stage: SDK_Unit_Tests  (mirrors `SDK.Unit.Test.Job.yml`)
  # ---------------------------------------------------------------------------
  sdk-unit-tests:
    name: SDK Unit Tests (${{ matrix.os_label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os_label: windows
            runner: windows-latest
          - os_label: linux
            runner: ubuntu-latest
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        working-directory: sdk
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sdk/package-lock.json

      - run: npm ci
      - run: npm run build
      - run: npm test

  # ---------------------------------------------------------------------------
  # Stage: Package_MXC  (mirrors `Package.NpmSdk.Job.yml`)
  # ---------------------------------------------------------------------------
  package-npm-sdk:
    name: Package NPM SDK
    needs: build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sdk/package-lock.json

      # Download all five build artifacts into the sdk/bin layout the
      # SDK packager expects. The sdkArch keys here mirror the 1ES
      # `Package.NpmSdk.Job.yml` `targets:` block — Windows-x64 and
      # Linux-x64 both land under bin/x64 but their binaries have
      # disjoint filenames (wxc-exec.exe vs lxc-exec) so they don't
      # collide. Same for arm64 (wxc-exec.exe vs lxc-exec vs
      # mxc-exec-mac).
      - name: Download wxc-binaries x64
        uses: actions/download-artifact@v4
        with:
          name: wxc-binaries-x86_64-pc-windows-msvc
          path: sdk/bin/x64
      - name: Download wxc-binaries arm64
        uses: actions/download-artifact@v4
        with:
          name: wxc-binaries-aarch64-pc-windows-msvc
          path: sdk/bin/arm64
      - name: Download lxc-binaries x64
        uses: actions/download-artifact@v4
        with:
          name: lxc-binaries-x86_64-unknown-linux-gnu
          path: sdk/bin/x64
      - name: Download lxc-binaries arm64
        uses: actions/download-artifact@v4
        with:
          name: lxc-binaries-aarch64-unknown-linux-gnu
          path: sdk/bin/arm64
      - name: Download mxc-binaries arm64 (mac)
        uses: actions/download-artifact@v4
        with:
          name: mxc-binaries-aarch64-apple-darwin
          path: sdk/bin/arm64

      # GitHub artifact downloads strip Unix execute permissions (same
      # behavior as ADO pipeline artifacts). Restore +x.
      # Search path is `bin` (not `sdk/bin`) because this step inherits
      # the job's `working-directory: sdk` default — searching `sdk/bin`
      # would resolve to `sdk/sdk/bin` and the find would no-op.
      - name: Restore execute permissions
        shell: bash
        run: |
          set -euo pipefail
          for name in lxc-exec linux-test-proxy mxc-exec-mac; do
            find bin -name "$name" -exec chmod +x {} +
          done

      - run: npm ci
      - run: npm run build
      - run: npm pack

      - name: Upload SDK package
        uses: actions/upload-artifact@v4
        with:
          name: mxc-npm-sdk-package
          path: sdk/*.tgz
          if-no-files-found: error
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Stage: SDK_Integration_Tests  (mirrors `SDK.Integration.Test.Job.yml`)
  # ---------------------------------------------------------------------------
  sdk-integration-tests:
    name: SDK Integration Tests (${{ matrix.os_label }})
    needs: package-npm-sdk
    strategy:
      fail-fast: false
      matrix:
        include:
          - os_label: windows
            runner: windows-latest
          - os_label: linux
            runner: ubuntu-latest
          - os_label: macos
            runner: macos-14
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        working-directory: sdk/tests/integration
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sdk/tests/integration/package-lock.json

      - name: Download SDK package
        uses: actions/download-artifact@v4
        with:
          name: mxc-npm-sdk-package
          path: sdk-pkg

      - name: Install dependencies + SDK from artifact
        shell: bash
        run: |
          set -euo pipefail
          npm ci
          SDK_TGZ=$(ls ../../../sdk-pkg/*.tgz | head -n1)
          npm install "$SDK_TGZ"

      - name: npm run build
        run: npm run build

      # Linux: install LXC + bubblewrap (mirrors 1ES integration job).
      - name: Install LXC + bubblewrap (Linux only)
        if: matrix.os_label == 'linux'
        shell: bash
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq lxc lxc-utils dnsmasq-base iptables bubblewrap

      - name: npm test (Linux, sudo, with LXC)
        if: matrix.os_label == 'linux'
        shell: bash
        run: sudo MXC_SKIP_LXC_NETWORK_TESTS=1 npm test

      - name: Restore execute permission on mxc-exec-mac
        if: matrix.os_label == 'macos'
        shell: bash
        run: |
          set -euo pipefail
          BIN=$(find node_modules/@microsoft/mxc-sdk/bin -name mxc-exec-mac -print -quit)
          if [ -n "$BIN" ]; then chmod +x "$BIN"; else echo "mxc-exec-mac not found" && exit 1; fi

      - name: npm test (Windows / macOS)
        if: matrix.os_label != 'linux'
        env:
          MXC_SKIP_OS_BUILD_DEPENDENT_TESTS: '1'
        run: npm test
