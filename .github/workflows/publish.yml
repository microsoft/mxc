name: Publish SDK to GPR

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    uses: ./.github/workflows/Build.yml

  publish:
    needs: build
    runs-on: windows-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: npm-packages
          path: packages

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@microsoft'

      - name: Publish SDK
        run: |
          $tgz = (Get-Item packages\*.tgz).FullName
          echo "Publishing $tgz"
          npm publish $tgz
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
