<svg xmlns="http://www.w3.org/2000/svg" width="700" height="500" viewBox="0 0 700 500">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="700" height="500" fill="#0f172a"/>

  <!-- Title above card -->
  <text x="350" y="36" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="600" fill="#94a3b8">Interactive Approval — Final Scoreboard</text>

  <!-- Card -->
  <rect x="40" y="52" width="620" height="430" rx="12" ry="12" fill="#1e293b" filter="url(#shadow)" stroke="#334155" stroke-width="1.5"/>

  <!-- Card title -->
  <text x="350" y="90" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#f8fafc">Denied Resource Resolution</text>
  <line x1="80" y1="105" x2="620" y2="105" stroke="#334155" stroke-width="1"/>

  <!-- Section 1: Fixed (green) -->
  <text x="80" y="138" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" fill="#22c55e">✅ Fixed (3)</text>

  <circle cx="92" cy="166" r="3" fill="#22c55e"/>
  <text x="104" y="171" font-family="Consolas, Courier New, monospace" font-size="13" fill="#bbf7d0">C:\Users\dev\.nuget\packages</text>
  <text x="530" y="171" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#86efac">(read)</text>

  <circle cx="92" cy="194" r="3" fill="#22c55e"/>
  <text x="104" y="199" font-family="Consolas, Courier New, monospace" font-size="13" fill="#bbf7d0">C:\Users\dev\.cargo\registry</text>
  <text x="530" y="199" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#86efac">(read)</text>

  <circle cx="92" cy="222" r="3" fill="#22c55e"/>
  <text x="104" y="227" font-family="Consolas, Courier New, monospace" font-size="13" fill="#bbf7d0">api.nuget.org:443</text>
  <text x="530" y="227" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#86efac">(network)</text>

  <!-- Separator -->
  <line x1="80" y1="248" x2="620" y2="248" stroke="#334155" stroke-width="0.5" stroke-dasharray="4,4"/>

  <!-- Section 2: User Blocked (red) -->
  <text x="80" y="280" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" fill="#ef4444">⛔ User Blocked (1)</text>

  <circle cx="92" cy="308" r="3" fill="#ef4444"/>
  <text x="104" y="313" font-family="Consolas, Courier New, monospace" font-size="13" fill="#fecaca">C:\Users\dev\Documents\secrets</text>
  <text x="530" y="313" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#fca5a5">(read)</text>

  <!-- Separator -->
  <line x1="80" y1="338" x2="620" y2="338" stroke="#334155" stroke-width="0.5" stroke-dasharray="4,4"/>

  <!-- Section 3: Not Supported (amber) -->
  <text x="80" y="370" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" fill="#f59e0b">⚠️ Not Supported (2)</text>

  <circle cx="92" cy="398" r="3" fill="#f59e0b"/>
  <text x="104" y="403" font-family="Consolas, Courier New, monospace" font-size="13" fill="#fef3c7">HKLM\SOFTWARE\Python</text>
  <text x="530" y="403" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#fde68a">(registry)</text>

  <circle cx="92" cy="426" r="3" fill="#f59e0b"/>
  <text x="104" y="431" font-family="Consolas, Courier New, monospace" font-size="13" fill="#fef3c7">CLSID:{xxx-yyy}</text>
  <text x="530" y="431" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#fde68a">(COM)</text>

  <!-- Bottom bar -->
  <line x1="80" y1="455" x2="620" y2="455" stroke="#334155" stroke-width="1"/>
  <text x="350" y="474" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#64748b">mxc — denied resource approval flow</text>
</svg>
