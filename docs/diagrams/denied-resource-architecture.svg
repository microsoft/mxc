<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arrowhead-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2978b5"/>
    </marker>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="#fafbfc"/>

  <!-- Title -->
  <text x="600" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">MXC Denied Resource Detection — Architecture</text>

  <!-- ===== LEFT SIDE: Sandbox Execution ===== -->
  <rect x="20" y="50" width="260" height="340" rx="8" fill="#f0f4f8" stroke="#d0d7de" stroke-width="1"/>
  <text x="150" y="72" text-anchor="middle" font-size="12" font-weight="bold" fill="#57606a">SANDBOX EXECUTION</text>

  <!-- User Application -->
  <rect x="50" y="88" width="200" height="40" rx="6" fill="#e8e8e8" stroke="#b0b0b0" filter="url(#shadow)"/>
  <text x="150" y="113" text-anchor="middle" font-size="11" fill="#333">User Application</text>

  <!-- MXC SDK -->
  <rect x="50" y="152" width="200" height="40" rx="6" fill="#dbeafe" stroke="#93c5fd" filter="url(#shadow)"/>
  <text x="150" y="170" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e40af">MXC SDK</text>
  <text x="150" y="184" text-anchor="middle" font-size="9" fill="#3b82f6">spawnSandbox()</text>

  <!-- wxc-exec.exe -->
  <rect x="50" y="216" width="200" height="44" rx="6" fill="#fed7aa" stroke="#fb923c" filter="url(#shadow)"/>
  <text x="150" y="234" text-anchor="middle" font-size="11" font-weight="bold" fill="#9a3412">wxc-exec.exe</text>
  <text x="150" y="249" text-anchor="middle" font-size="9" fill="#c2410c">Process Container (AppContainer)</text>

  <!-- Blocked Access -->
  <rect x="50" y="284" width="200" height="40" rx="6" fill="#fecaca" stroke="#f87171" filter="url(#shadow)"/>
  <text x="150" y="300" text-anchor="middle" font-size="10" fill="#991b1b">🚫 Access Blocked</text>
  <text x="150" y="314" text-anchor="middle" font-size="9" fill="#b91c1c">Generates denial events</text>

  <!-- Sandbox arrows -->
  <line x1="150" y1="128" x2="150" y2="152" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="150" y1="192" x2="150" y2="216" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="150" y1="260" x2="150" y2="284" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- ===== CENTER: Detection Tiers ===== -->
  <rect x="300" y="50" width="520" height="440" rx="8" fill="#f8f9fa" stroke="#d0d7de" stroke-width="1"/>
  <text x="560" y="72" text-anchor="middle" font-size="12" font-weight="bold" fill="#57606a">DETECTION TIERS</text>

  <!-- Tier 1: ETW Service -->
  <rect x="320" y="88" width="480" height="105" rx="6" fill="#fff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="340" y="106" font-size="10" font-weight="bold" fill="#166534">TIER 1 — ETW Service (highest fidelity)</text>

  <rect x="335" y="114" width="120" height="36" rx="5" fill="#dcfce7" stroke="#86efac" filter="url(#shadow)"/>
  <text x="395" y="130" text-anchor="middle" font-size="9" font-weight="bold" fill="#166534">Windows Kernel</text>
  <text x="395" y="142" text-anchor="middle" font-size="8" fill="#15803d">ETW Events</text>

  <rect x="490" y="114" width="140" height="36" rx="5" fill="#fed7aa" stroke="#fb923c" filter="url(#shadow)"/>
  <text x="560" y="130" text-anchor="middle" font-size="9" font-weight="bold" fill="#9a3412">mxc-diagnostic-</text>
  <text x="560" y="142" text-anchor="middle" font-size="9" font-weight="bold" fill="#9a3412">console</text>

  <rect x="665" y="114" width="120" height="36" rx="5" fill="#fed7aa" stroke="#fb923c" filter="url(#shadow)"/>
  <text x="725" y="128" text-anchor="middle" font-size="8" font-weight="bold" fill="#9a3412">Named Pipe</text>
  <text x="725" y="140" text-anchor="middle" font-size="7" fill="#c2410c">\\.\pipe\mxc-</text>
  <text x="725" y="149" text-anchor="middle" font-size="7" fill="#c2410c">denials-{SID}</text>

  <!-- Tier 1 arrows -->
  <line x1="455" y1="132" x2="488" y2="132" stroke="#555" stroke-width="1.2" marker-end="url(#arrowhead)"/>
  <text x="472" y="126" text-anchor="middle" font-size="7" fill="#666">ETW</text>
  <line x1="630" y1="132" x2="663" y2="132" stroke="#555" stroke-width="1.2" marker-end="url(#arrowhead)"/>
  <text x="647" y="126" text-anchor="middle" font-size="7" fill="#666">JSON</text>

  <!-- Tier 1 output arrow -->
  <rect x="335" y="158" width="455" height="22" rx="4" fill="#dbeafe" stroke="#93c5fd"/>
  <text x="562" y="173" text-anchor="middle" font-size="8" fill="#1e40af">SDK reads pipe → parseDiagnosticMessage() → mpsc channel</text>

  <!-- Tier 2: Output Parsing -->
  <rect x="320" y="200" width="480" height="90" rx="6" fill="#fff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="340" y="218" font-size="10" font-weight="bold" fill="#1e40af">TIER 2 — Output Parsing (heuristic)</text>

  <rect x="335" y="226" width="130" height="36" rx="5" fill="#fed7aa" stroke="#fb923c" filter="url(#shadow)"/>
  <text x="400" y="242" text-anchor="middle" font-size="9" font-weight="bold" fill="#9a3412">Process Output</text>
  <text x="400" y="254" text-anchor="middle" font-size="8" fill="#c2410c">stdout / stderr</text>

  <rect x="500" y="226" width="130" height="36" rx="5" fill="#dbeafe" stroke="#93c5fd" filter="url(#shadow)"/>
  <text x="565" y="242" text-anchor="middle" font-size="9" font-weight="bold" fill="#1e40af">Regex Engine</text>
  <text x="565" y="254" text-anchor="middle" font-size="8" fill="#3b82f6">21 patterns</text>

  <rect x="665" y="226" width="120" height="36" rx="5" fill="#dbeafe" stroke="#93c5fd" filter="url(#shadow)"/>
  <text x="725" y="242" text-anchor="middle" font-size="9" font-weight="bold" fill="#1e40af">Matched</text>
  <text x="725" y="254" text-anchor="middle" font-size="8" fill="#3b82f6">Denials</text>

  <!-- Tier 2 arrows -->
  <line x1="465" y1="244" x2="498" y2="244" stroke="#555" stroke-width="1.2" marker-end="url(#arrowhead)"/>
  <text x="482" y="238" text-anchor="middle" font-size="7" fill="#666">text</text>
  <line x1="630" y1="244" x2="663" y2="244" stroke="#555" stroke-width="1.2" marker-end="url(#arrowhead)"/>
  <text x="647" y="238" text-anchor="middle" font-size="7" fill="#666">match</text>

  <!-- Tier 2 output -->
  <rect x="335" y="268" width="455" height="16" rx="4" fill="#dbeafe" stroke="#93c5fd"/>
  <text x="562" y="279" text-anchor="middle" font-size="8" fill="#1e40af">parseOutputForDenials() → DeniedResourceInfo[]</text>



  <!-- Connection from sandbox to tiers -->
  <path d="M 250 150 C 280 150, 290 170, 310 170" stroke="#2978b5" stroke-width="1.5" fill="none" stroke-dasharray="4,2" marker-end="url(#arrowhead-blue)"/>
  <path d="M 250 240 C 280 240, 290 244, 318 244" stroke="#2978b5" stroke-width="1.5" fill="none" stroke-dasharray="4,2" marker-end="url(#arrowhead-blue)"/>


  <!-- ===== RIGHT SIDE: Unified Detection ===== -->
  <rect x="840" y="50" width="340" height="340" rx="8" fill="#f0f4f8" stroke="#d0d7de" stroke-width="1"/>
  <text x="1010" y="72" text-anchor="middle" font-size="12" font-weight="bold" fill="#57606a">UNIFIED DETECTION</text>

  <!-- getDeniedResources() -->
  <rect x="870" y="90" width="280" height="44" rx="6" fill="#dbeafe" stroke="#93c5fd" filter="url(#shadow)"/>
  <text x="1010" y="110" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e40af">getDeniedResources()</text>
  <text x="1010" y="124" text-anchor="middle" font-size="9" fill="#3b82f6">Aggregates both tiers</text>

  <!-- Merge arrows from tiers to getDeniedResources -->
  <line x1="790" y1="170" x2="868" y2="112" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="790" y1="244" x2="868" y2="112" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)"/>


  <!-- Deduplication -->
  <rect x="870" y="155" width="280" height="50" rx="6" fill="#dbeafe" stroke="#93c5fd" filter="url(#shadow)"/>
  <text x="1010" y="175" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e40af">Deduplication</text>
  <text x="1010" y="192" text-anchor="middle" font-size="9" fill="#3b82f6">Priority: ETW > Output Parsing</text>

  <line x1="1010" y1="134" x2="1010" y2="155" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- DeniedResourceInfo[] -->
  <rect x="870" y="226" width="280" height="44" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
  <text x="1010" y="246" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e40af">DeniedResourceInfo[]</text>
  <text x="1010" y="260" text-anchor="middle" font-size="9" fill="#3b82f6">resource, type, source tier, details</text>

  <line x1="1010" y1="205" x2="1010" y2="226" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- ===== BOTTOM: Policy Regeneration Loop ===== -->
  <rect x="20" y="510" width="1160" height="185" rx="8" fill="#fffbeb" stroke="#fbbf24" stroke-width="1"/>
  <text x="600" y="532" text-anchor="middle" font-size="12" font-weight="bold" fill="#92400e">POLICY REGENERATION LOOP</text>

  <!-- DeniedResourceInfo input -->
  <rect x="60" y="550" width="160" height="40" rx="6" fill="#dbeafe" stroke="#93c5fd" filter="url(#shadow)"/>
  <text x="140" y="568" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e40af">DeniedResource</text>
  <text x="140" y="581" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e40af">Info[]</text>

  <!-- User Approval -->
  <rect x="280" y="550" width="180" height="40" rx="6" fill="#e8e8e8" stroke="#b0b0b0" filter="url(#shadow)"/>
  <text x="370" y="568" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">User Approval</text>
  <text x="370" y="581" text-anchor="middle" font-size="9" fill="#555">Interactive prompt</text>

  <!-- generateUpdatedPolicy -->
  <rect x="520" y="545" width="240" height="50" rx="6" fill="#dbeafe" stroke="#93c5fd" filter="url(#shadow)"/>
  <text x="640" y="565" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e40af">generateUpdatedPolicy</text>
  <text x="640" y="579" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e40af">FromDetection()</text>
  <text x="640" y="591" text-anchor="middle" font-size="8" fill="#3b82f6">Merges approved resources into policy</text>

  <!-- Updated SandboxPolicy -->
  <rect x="820" y="550" width="170" height="40" rx="6" fill="#dbeafe" stroke="#93c5fd" filter="url(#shadow)"/>
  <text x="905" y="568" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e40af">Updated</text>
  <text x="905" y="581" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e40af">SandboxPolicy</text>

  <!-- Re-run Sandbox -->
  <rect x="1040" y="550" width="120" height="40" rx="6" fill="#fed7aa" stroke="#fb923c" filter="url(#shadow)"/>
  <text x="1100" y="568" text-anchor="middle" font-size="10" font-weight="bold" fill="#9a3412">Re-run</text>
  <text x="1100" y="581" text-anchor="middle" font-size="10" font-weight="bold" fill="#9a3412">Sandbox</text>

  <!-- Bottom arrows -->
  <line x1="220" y1="570" x2="278" y2="570" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="460" y1="570" x2="518" y2="570" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="489" y="563" text-anchor="middle" font-size="7" fill="#666">approved[]</text>
  <line x1="760" y1="570" x2="818" y2="570" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="789" y="563" text-anchor="middle" font-size="7" fill="#666">JSON</text>
  <line x1="990" y1="570" x2="1038" y2="570" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Loop-back arrow -->
  <path d="M 1100 590 L 1100 640 C 1100 660, 1080 670, 1060 670 L 180 670 C 140 670, 120 650, 120 630 L 120 400 C 120 380, 140 370, 150 370" stroke="#92400e" stroke-width="1.5" fill="none" stroke-dasharray="6,3" marker-end="url(#arrowhead)"/>
  <text x="600" y="660" text-anchor="middle" font-size="9" font-weight="bold" fill="#92400e">← Iterative refinement loop →</text>

  <!-- Connection from DeniedResourceInfo to bottom -->
  <line x1="1010" y1="270" x2="1010" y2="490" stroke="#555" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="1010" y1="490" x2="140" y2="490" stroke="#555" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="140" y1="490" x2="140" y2="548" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- ===== LEGEND ===== -->
  <rect x="20" y="720" width="1160" height="65" rx="8" fill="#fff" stroke="#d0d7de" stroke-width="1"/>
  <text x="50" y="740" font-size="11" font-weight="bold" fill="#333">Legend:</text>

  <!-- SDK/TypeScript -->
  <rect x="110" y="728" width="18" height="14" rx="3" fill="#dbeafe" stroke="#93c5fd"/>
  <text x="134" y="740" font-size="10" fill="#333">SDK / TypeScript</text>

  <!-- Rust/Native -->
  <rect x="270" y="728" width="18" height="14" rx="3" fill="#fed7aa" stroke="#fb923c"/>
  <text x="294" y="740" font-size="10" fill="#333">Rust / Native Binary</text>

  <!-- Windows Kernel/OS -->
  <rect x="450" y="728" width="18" height="14" rx="3" fill="#dcfce7" stroke="#86efac"/>
  <text x="474" y="740" font-size="10" fill="#333">Windows Kernel / OS</text>

  <!-- User Interaction -->
  <rect x="650" y="728" width="18" height="14" rx="3" fill="#e8e8e8" stroke="#b0b0b0"/>
  <text x="674" y="740" font-size="10" fill="#333">User Interaction</text>

  <!-- Arrows legend -->
  <line x1="810" y1="735" x2="845" y2="735" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="852" y="740" font-size="10" fill="#333">Data flow</text>

  <line x1="950" y1="735" x2="985" y2="735" stroke="#555" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrowhead)"/>
  <text x="992" y="740" font-size="10" fill="#333">Async / indirect</text>

  <!-- Data format labels -->
  <text x="50" y="765" font-size="9" fill="#666">Data formats on arrows: ETW = Event Tracing for Windows events | JSON = structured denial records | text = raw process output | mpsc = multi-producer channel</text>
</svg>
