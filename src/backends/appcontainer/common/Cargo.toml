[package]
name = "appcontainer_common"
version.workspace = true
edition.workspace = true
license.workspace = true

[features]
# Compile-time gate for Tier 2 (AppContainer + BFS via bfscfg.exe).
# OFF by default: production wxc-exec cannot resolve or spawn bfscfg.exe,
# and `fallback_detector::detect` naturally falls through T2 to T3 because
# `find_bfscfg_exe` returns `Ok(None)`. Enable explicitly on hosts where
# bfscfg.exe is known safe to invoke.
tier2_bfs = []

# Compile-time gate for the `MXC_FORCE_TIER` environment test seam in the
# *production* binary. OFF by default: `detect` only honors `MXC_FORCE_TIER`
# under `cfg(test)` (unit tests) so the shipped wxc-exec never lets the
# environment pick a tier. Enable explicitly to build a wxc-exec that honors
# `MXC_FORCE_TIER` — used by the Tier 4 (RestrictedToken) workload harness,
# which has no other way to reach a tier `detect` does not select naturally.
force_tier_seam = []

[dependencies]
wxc_common = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
getrandom = { workspace = true }

[target.'cfg(target_os = "windows")'.dependencies]
windows = { workspace = true }
windows-core = { workspace = true }
flatbuffers = { workspace = true }
sandbox_spec = { workspace = true }
widestring = { workspace = true }
winreg = { workspace = true }

[dev-dependencies]
tempfile.workspace = true
