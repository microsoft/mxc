[package]
name = "plm"
version = "0.1.0"
edition.workspace = true

[lib]
name = "plm"
path = "src/lib.rs"

[[bin]]
name = "plm"
path = "src/main.rs"

[dependencies]
clap.workspace = true
anyhow.workspace = true
# serde_json + chrono are needed by the portable `config` and
# `access_event` modules, so they must compile on every target (not just
# Windows). roxmltree is also portable — `event_parser`'s pure XML
# parsing (round-3 testability fix) compiles on every target so its
# unit tests can run in cross-platform CI. The `windows` crate stays
# target-gated below since it has no non-Windows equivalent.
serde_json = { version = "1", features = ["preserve_order"] }
chrono = "0.4"
roxmltree = "0.20"

[target.'cfg(target_os = "windows")'.dependencies]
windows = { workspace = true, features = [
    "Win32_System_EventLog",
    "Win32_System_SystemInformation",
] }

[build-dependencies]
mxc_build_common.workspace = true
