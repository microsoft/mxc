[package]
name = "plm"
version = "0.1.0"
edition.workspace = true

[lib]
name = "plm"
path = "src/lib.rs"

[[bin]]
name = "plm"
path = "src/main.rs"

[dependencies]
clap.workspace = true
anyhow.workspace = true
# serde_json + chrono are needed by the portable `config` and
# `access_event` modules, so they must compile on every target (not just
# Windows). The Windows-only event-parsing / capability-resolution code
# pulls in roxmltree and the windows crate via the target-gated section
# below.
serde_json = { version = "1", features = ["preserve_order"] }
chrono = "0.4"

[target.'cfg(target_os = "windows")'.dependencies]
roxmltree = "0.20"
windows = { workspace = true, features = [
    "Win32_System_EventLog",
] }

[build-dependencies]
mxc_build_common.workspace = true
