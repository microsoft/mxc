[package]
name = "wxc_common"
version.workspace = true
edition.workspace = true

[features]
microvm = ["dep:nanvix_common", "dep:uuid"]
# Enables JSON Schema generation from the wire types (Phase 2 option B1:
# decorate the existing permissive Raw* structs). Off by default so normal
# builds and the production parse path don't carry schemars.
schema-gen = ["dep:schemars"]

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
base64 = { workspace = true }
url = { workspace = true }
getrandom = { workspace = true }
semver = "1"
schemars = { version = "0.8", optional = true }
nanvix_common = { path = "../../backends/nanvix/common", optional = true }
uuid = { workspace = true, optional = true }

[target.'cfg(target_os = "windows")'.dependencies]
windows = { workspace = true }
windows-core = { workspace = true }
widestring = { workspace = true }
winreg = { workspace = true }

[target.'cfg(target_os = "linux")'.dependencies]
libc = { workspace = true }

[dev-dependencies]
tempfile = "3"
