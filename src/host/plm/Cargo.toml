[package]
name = "plm"
version = "0.1.0"
edition.workspace = true

[lib]
name = "plm"
path = "src/lib.rs"

[[bin]]
name = "plm"
path = "src/main.rs"
# The release binary carries a `requireAdministrator` application
# manifest (see build.rs) and Windows refuses to launch it unelevated
# with ERROR_ELEVATION_REQUIRED (740). main.rs has no `#[test]` items
# (all unit tests live in the `plm` lib), so its test binary is empty
# — disable it entirely so `cargo test -p plm --release` doesn't try
# to launch the manifested bin from an unelevated dev shell. Library
# and integration tests still run.
test = false

[dependencies]
clap.workspace = true
anyhow.workspace = true
# Portable deps (config / access_event / event_parser) must compile on
# every target so their unit tests run in cross-platform CI. The
# `windows` crate stays target-gated below.
serde_json.workspace = true
chrono.workspace = true
roxmltree.workspace = true

[target.'cfg(target_os = "windows")'.dependencies]
windows = { workspace = true, features = [
    "Win32_System_EventLog",
    "Win32_System_SystemInformation",
    "Win32_System_Threading",
] }
wxc_common = { workspace = true }

[build-dependencies]
mxc_build_common.workspace = true

[target.'cfg(target_os = "windows")'.build-dependencies]
embed-manifest = "1.4"

[dev-dependencies]
tempfile.workspace = true
