[package]
name = "plmtester"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "PLMTester"
path = "src/main.rs"

[dependencies]
anyhow = "1"
clap = { version = "4", features = ["derive"] }

# Windows-only deps: pulled in only on Windows targets so the crate's
# Linux/macOS stub builds without the win-screenshot / windows tree.
[target.'cfg(target_os = "windows")'.dependencies]
image = { version = "0.25", default-features = false, features = ["png"] }
win-screenshot = "4"

# Use the workspace `windows` crate (0.62) and extend its feature set
# with the WinRT capture / DXGI / clipboard / injection modules that
# plmtester needs on top of the workspace baseline.
[target.'cfg(target_os = "windows")'.dependencies.windows]
workspace = true
features = [
    "Foundation",
    "Graphics_Capture",
    "Graphics_DirectX",
    "Graphics_DirectX_Direct3D11",
    "Win32_Graphics_Direct3D",
    "Win32_Graphics_Direct3D11",
    "Win32_Graphics_Dxgi",
    "Win32_Graphics_Dxgi_Common",
    "Win32_Graphics_Gdi",
    "Win32_System_WinRT",
    "Win32_System_WinRT_Direct3D11",
    "Win32_System_WinRT_Graphics_Capture",
    "Win32_System_DataExchange",
    "Win32_System_StationsAndDesktops",
    "Win32_UI_Input_KeyboardAndMouse",
]
