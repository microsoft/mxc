[package]
name = "plmtester"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "PLMTester"
path = "src/main.rs"

[dependencies]
anyhow = "1"
clap = { version = "4", features = ["derive"] }

# Windows-only deps: pulled in only on Windows targets so the crate's
# Linux/macOS stub builds without the win-screenshot / windows-0.58 trees.
[target.'cfg(target_os = "windows")'.dependencies]
image = { version = "0.25", default-features = false, features = ["png"] }
win-screenshot = "4"

# NOTE: pinned to windows 0.58 (vs workspace 0.62) on purpose -- the
# Graphics_Capture / DXGI / clipboard APIs we use here have breaking
# signature changes between 0.58 and 0.62 (HWND/HANDLE/HMODULE became
# Option<T>, IAsyncOperation::get was removed, etc.). Migrating
# plmtester to 0.62 is tracked separately; this crate is build-only
# test collateral and is not linked into shipping binaries.
[target.'cfg(target_os = "windows")'.dependencies.windows]
version = "0.58"
features = [
    "Foundation",
    "Graphics_Capture",
    "Graphics_DirectX",
    "Graphics_DirectX_Direct3D11",
    "Win32_Foundation",
    "Win32_Graphics_Direct3D",
    "Win32_Graphics_Direct3D11",
    "Win32_Graphics_Dxgi",
    "Win32_Graphics_Dxgi_Common",
    "Win32_Graphics_Gdi",
    "Win32_Security",
    "Win32_System_Com",
    "Win32_System_Threading",
    "Win32_System_Diagnostics_Debug",
    "Win32_System_WinRT",
    "Win32_System_WinRT_Direct3D11",
    "Win32_System_WinRT_Graphics_Capture",
    "Win32_System_Console",
    "Win32_UI_WindowsAndMessaging",
    "Win32_UI_Shell",
    "Win32_System_DataExchange",
    "Win32_System_Memory",
    "Win32_System_Ole",
    "Win32_System_StationsAndDesktops",
    "Win32_System_LibraryLoader",
    "Win32_UI_Input_KeyboardAndMouse",
]
