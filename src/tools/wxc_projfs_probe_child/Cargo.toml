[package]
name = "wxc_projfs_probe_child"
version = "0.1.0"
edition.workspace = true
publish = false

# The AppContainer-side half of the ProjFS-T3 step-1d spike. Spawned by
# wxc_projfs_probe inside an AppContainer; enumerates and reads through the
# projected root and reports the per-operation outcome over a named pipe.

[[bin]]
name = "wxc-projfs-probe-child"
path = "src/main.rs"

[target.'cfg(target_os = "windows")'.dependencies]
windows = { workspace = true }
windows-core = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
