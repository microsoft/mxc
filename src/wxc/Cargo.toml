[package]
name = "wxc"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "wxc-exec"
path = "src/main.rs"

[dependencies]
wxc_common.workspace = true
anyhow.workspace = true
clap.workspace = true
windows.workspace = true

[target.'cfg(windows)'.dependencies]
nanvix_binaries = { path = "../nanvix_binaries", optional = true }

[features]
default = []
microvm = ["nanvix_binaries"]
